name: Bygg

on:
  push:
    branches: [main, 'auto/**']
  pull_request_target:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-build:
    name: Backend-bygg
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sjekk ut grunnmur
        uses: actions/checkout@v6
        with:
          repository: TommySkogstad/grunnmur
          token: ${{ secrets.GRUNNMUR_TOKEN }}
          path: grunnmur

      - name: Sett opp JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Bygg backend
        working-directory: backend
        run: ./gradlew build --no-daemon

  frontend-build:
    name: Frontend-bygg
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sett opp Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Installer avhengigheter
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Bygg frontend
        working-directory: frontend
        run: npm run build
